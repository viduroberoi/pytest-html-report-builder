name: Publish

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync pyproject version from release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import pathlib
          import re
          import os

          tag = os.environ["RELEASE_TAG"]
          version = tag[1:] if tag.startswith("v") else tag
          pyproject = pathlib.Path("pyproject.toml")
          content = pyproject.read_text(encoding="utf-8")
          updated = re.sub(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              content,
              count=1,
          )
          if updated == content:
              raise SystemExit("Could not update version in pyproject.toml")
          pyproject.write_text(updated, encoding="utf-8")
          print(f"Using package version: {version}")
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    # No reviewers on the `testpypi` environment means this runs automatically.
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    # Add required reviewers on the `pypi` environment in GitHub settings
    # to require a manual approval before this job can publish.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
